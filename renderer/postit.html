<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', system-ui, sans-serif;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-font-smoothing: antialiased;
  }
  .ic {
    width: 1em; height: 1em; display: inline-block; flex: 0 0 auto;
    vertical-align: -0.14em; color: inherit;
  }
  .egg {
    display: inline-block; width: 30px; height: 38px;
    border-radius: 50% 50% 46% 46%;
    background: linear-gradient(160deg, #fff7e0, #f0d896);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: inset -4px -5px 8px rgba(157,117,43,0.12), 0 5px 10px rgba(0,0,0,0.24);
  }

  /* ===== 상단 바 ===== */
  .topbar {
    display: flex; justify-content: flex-end; align-items: center; gap: 6px;
    opacity: 0.4; transition: opacity 0.2s;
  }
  body.side-left .topbar { justify-content: flex-start; }
  .topbar:hover { opacity: 1; }
  .pill {
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap; flex-shrink: 0;
    background: rgba(16,19,28,0.78);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(140,160,255,0.22);
    border-radius: 10px; padding: 5px 9px;
    font-size: 12px; font-weight: 700; color: #e9ecf4;
  }
  .pill.pts { color: #f5c451; }
  button.pill { cursor: pointer; }
  button.pill:hover { border-color: rgba(140,160,255,0.48); }
  button.focus-toggle.is-on {
    color: #ede9fe;
    background: rgba(91, 33, 182, 0.92);
    border-color: rgba(196, 181, 253, 0.9);
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.35);
  }
  .grip {
    cursor: move;
    letter-spacing: 1px;
    user-select: none;
  }
  .grip:active { border-color: rgba(255,255,255,0.5); }
  button.quit:hover { border-color: rgba(255,80,80,0.8); color: #ff7b7b; }
  body.mini .focus-toggle,
  body.mini #btnOpen,
  body.mini #btnQuit,
  body.mini .level-character-row { display: none; }

  #stack {
    display: flex; flex-direction: column; gap: 13px;
    overflow-y: auto; flex: 1; padding: 6px 2px 24px;
  }
  #stack::-webkit-scrollbar { width: 0; }

  /* ===== 포스트잇 ===== */
  .postit {
    position: relative;
    border-radius: 12px;
    padding: 16px 14px 10px 18px;
    background: linear-gradient(170deg, rgba(30,34,46,0.92), rgba(20,23,32,0.92));
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    --peek: 0%;
    --stripe: #fbbf24;
    --stripe-glow: transparent;
    transform: translateX(calc(var(--peek) * var(--dir, 1)));
    transition: transform 0.45s cubic-bezier(0.25, 0.9, 0.3, 1), box-shadow 0.16s;
    min-height: 82px;
    color: #e8ebf4;
  }
  /* 위젯이 화면 왼쪽에 있으면 슬라이드 방향 반전 (왼쪽 가장자리에 자연스레 붙음) */
  body { --dir: 1; }
  body.side-left { --dir: -1; }
  /* 왼쪽 도킹: 내용도 좌우 반전해서 보이는 쪽(오른쪽 가장자리)에 붙임 */
  body.side-left .p-title { text-align: right; }
  body.side-left .p-time { flex-direction: row-reverse; }
  body.side-left .p-actions { flex-direction: row-reverse; justify-content: flex-start; }
  body.side-left .bomb { right: auto; left: -5px; }
  body.side-left .boom-icon { right: auto; left: -9px; }
  body.side-left .fuse-bar { transform: scaleX(-1); }
  .postit:hover {
    --peek: 0%;
    transform: translateX(0) translateY(-3px) scale(1.02);
    box-shadow: 0 10px 24px rgba(0,0,0,0.45);
    z-index: 2;
  }
  /* 마감까지 남은 시간에 따라 서랍처럼 밀려 나옴 */
  .peek-far  { --peek: 82%; }  /* 3시간 이상: 끄트머리만 */
  .peek-mid  { --peek: 55%; }  /* 3시간 이내 */
  .peek-near { --peek: 26%; }  /* 1시간 이내 */
  /* 30분 이내부터는 --peek: 0 (완전히 나옴) + 폭탄 점화 */
  /* 색상 스트라이프 */
  .postit::before {
    content: '';
    position: absolute; top: 8px; bottom: 8px; left: 0;
    width: 4.5px; border-radius: 0 4px 4px 0;
    background: var(--stripe);
    box-shadow: 0 0 16px var(--stripe-glow);
  }
  .c-yellow { --stripe: #fbbf24; }
  .c-pink   { --stripe: #f472b6; }
  .c-blue   { --stripe: #60a5fa; }
  .c-green  { --stripe: #4ade80; }
  .c-purple { --stripe: #a78bfa; }
  .c-orange { --stripe: #fb923c; }

  .p-time {
    font-size: 11.5px; font-weight: 800; letter-spacing: 0.2px;
    display: flex; gap: 7px; align-items: baseline; opacity: 0.75;
  }
  .p-remain { font-size: 11px; font-weight: 700; }
  .p-clock { display: inline-flex; align-items: center; gap: 4px; }
  .p-clock .ic { width: 12px; height: 12px; }
  .p-title {
    font-size: 15.5px; font-weight: 700; margin-top: 4px;
    word-break: keep-all; overflow-wrap: anywhere; line-height: 1.35;
  }
  .postit.focus-hero {
    min-height: 106px; padding: 20px 17px 13px 21px;
    transform: scale(1.02);
    border-color: rgba(140,160,255,0.35);
  }
  .postit.focus-hero .p-time { font-size: 12.5px; }
  .postit.focus-hero .p-remain { font-size: 12px; }
  .postit.focus-hero .p-title { font-size: 19px; line-height: 1.4; margin-top: 7px; }

  .focus-more {
    display: none; align-self: flex-end;
    white-space: nowrap;
    border: 1px solid rgba(140,160,255,0.3);
    border-radius: 10px; padding: 6px 13px;
    background: rgba(16,19,28,0.85); color: #cdd7f5;
    box-shadow: 0 5px 14px rgba(0,0,0,0.28);
    font-family: inherit; font-size: 12px; font-weight: 800;
    cursor: pointer;
  }
  .focus-more:hover { border-color: rgba(196,181,253,0.9); color: #fff; }
  body.side-left .focus-more { align-self: flex-start; }

  .p-actions { display: none; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .postit:hover .p-actions { display: flex; }
  .p-actions button {
    border: none; border-radius: 7px; padding: 5px 9px;
    white-space: nowrap;
    font-size: 12px; cursor: pointer; font-weight: 700; font-family: inherit;
    background: rgba(20, 18, 10, 0.82); color: #fff;
    transition: background 0.1s;
  }
  .p-actions button:hover { background: #000; }
  .p-actions .b-done { background: #15803d; }
  .p-actions .b-done:hover { background: #166534; }
  .p-actions .b-delete { color: #c5cbd9; background: rgba(28,30,39,0.82); }
  .p-actions .b-delete:hover { color: #fecaca; background: #7f1d1d; }
  .p-actions .ic { width: 12px; height: 12px; margin-right: 3px; }

  /* ===== 도화선 ===== */
  .fuse-bar {
    display: none; position: relative;
    height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.10); margin-top: 9px;
  }
  .fuse-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #f59e0b, #ef4444);
    box-shadow: 0 0 8px rgba(239,68,68,0.7);
  }
  .fuse-spark {
    position: absolute; top: -2px; margin-left: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #ffd08a;
    box-shadow: 0 0 10px #f97316;
    animation: sparkle 0.3s infinite alternate;
  }
  @keyframes sparkle {
    from { transform: scale(0.7); opacity: 0.65; }
    to { transform: scale(1.35); opacity: 1; }
  }

  /* ===== 폭탄 ===== */
  .bomb {
    position: absolute; top: -10px; right: -5px;
    width: 21px; height: 21px; display: none;
    color: var(--stripe, #e8ebf4);
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
  }
  .boom-icon {
    display: none; position: absolute; top: -20px; right: -9px;
    width: 38px; height: 38px; color: #f97316;
    animation: boom 0.55s infinite alternate;
    filter: drop-shadow(0 0 10px rgba(255,120,0,0.8));
  }
  @keyframes boom { from { transform: scale(0.88); } to { transform: scale(1.28); } }

  .stage-burning .bomb { display: block; width: 25px; height: 25px; }
  .stage-burning .fuse-bar { display: block; }
  .stage-burning .fuse-spark { display: block; }

  .stage-critical .bomb { display: block; width: 29px; height: 29px; }
  .stage-critical .fuse-bar { display: block; }
  .stage-critical .fuse-spark { display: block; }

  .stage-panic .bomb { display: block; width: 33px; height: 33px; }
  .stage-panic .fuse-bar { display: block; }
  .stage-panic .fuse-spark { display: block; animation-duration: 0.13s; }
  .stage-panic {
    animation: shake 0.22s infinite;
  }
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-3px,1px); }
    50% { transform: translate(3px,-1px); }
    75% { transform: translate(-2px,-2px); }
  }

  .stage-boom .boom-icon { display: block; }

  /* ===== 상점 테마 ===== */
  body.theme-neon .postit {
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 16px var(--stripe-glow);
  }
  body.theme-neon .c-yellow { --stripe: #ffe600; --stripe-glow: rgba(255,230,0,0.8); }
  body.theme-neon .c-pink   { --stripe: #ff4da6; --stripe-glow: rgba(255,77,166,0.8); }
  body.theme-neon .c-blue   { --stripe: #2eb0ff; --stripe-glow: rgba(46,176,255,0.8); }
  body.theme-neon .c-green  { --stripe: #3bf05e; --stripe-glow: rgba(59,240,94,0.8); }
  body.theme-neon .c-purple { --stripe: #b66cff; --stripe-glow: rgba(182,108,255,0.8); }
  body.theme-neon .c-orange { --stripe: #ff9124; --stripe-glow: rgba(255,145,36,0.8); }

  body.theme-kraft .postit {
    background: linear-gradient(170deg, rgba(46,38,30,0.94), rgba(30,25,21,0.94));
    border-color: rgba(232,213,168,0.15);
    color: #f0e5d4;
  }
  body.theme-kraft .c-yellow { --stripe: #c9aa68; }
  body.theme-kraft .c-pink   { --stripe: #bd8d83; }
  body.theme-kraft .c-blue   { --stripe: #8da9a4; }
  body.theme-kraft .c-green  { --stripe: #9da56f; }
  body.theme-kraft .c-purple { --stripe: #a58c98; }
  body.theme-kraft .c-orange { --stripe: #bf8d52; }

  body.theme-midnight .postit {
    background: linear-gradient(170deg, rgba(12,13,18,0.96), rgba(8,9,13,0.96));
    border-color: rgba(140,160,255,0.12);
    color: #e6e9f2;
  }
  body.theme-midnight .fuse-bar { background: rgba(255,255,255,0.10); }

  body .postit.focus-hero { border-color: rgba(140,160,255,0.35); }
  body .postit.stage-burning,
  body .postit.stage-critical,
  body .postit.stage-panic {
    border-color: rgba(248,113,113,0.55);
    box-shadow: 0 0 18px rgba(239,68,68,0.28);
  }
  .stage-burning .p-time,
  .stage-critical .p-time,
  .stage-panic .p-time { color: #f6a6a6; opacity: 1; }
  body .postit.stage-boom {
    background: linear-gradient(170deg, rgba(43,29,25,0.96), rgba(18,18,24,0.96)) !important;
    border-color: rgba(249,115,22,0.68);
    box-shadow: 0 0 22px rgba(249,115,22,0.36);
    color: #ffd9c4;
  }
  body .postit.stage-boom .p-time { color: #ffc4a3; opacity: 0.95; }

  .empty-hint {
    text-align: center; color: #c9cfdd;
    background: rgba(13, 15, 20, 0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    padding: 13px; font-size: 12px; display: none; line-height: 1.7;
  }

  .level-character-row {
    display: flex; justify-content: flex-end; padding: 0 4px 2px;
    pointer-events: none;
  }
  body.side-left .level-character-row { justify-content: flex-start; }
  .level-character {
    border: none; background: transparent; padding: 0;
    cursor: pointer; pointer-events: auto; font-family: inherit;
  }
  .level-character img {
    height: 64px; max-width: 92px; object-fit: contain; display: block;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.45));
  }
  .level-character .fallback {
    display: none; align-items: center; justify-content: center;
    min-width: 54px; height: 42px; padding: 0 14px;
    border-radius: 10px; background: rgba(16,19,28,0.85);
    border: 1px solid rgba(140,160,255,0.22);
    box-shadow: 0 8px 18px rgba(0,0,0,0.28);
  }
  .level-character .fallback .egg { width: 26px; height: 34px; }
  .level-character.fallback-mode img { display: none; }
  .level-character.fallback-mode .fallback { display: flex; }
</style>
</head>

<script>
  const isMini = /[?&]mini=1/.test(location.search)
  if (isMini) {
    document.body.classList.add('mini')
    document.querySelector('.topbar').style.display = 'none'
  }
  let state = { todos: [], profile: null }
  let currentLevelStage = ''
  let focusMode = isMini
  let focusTouched = isMini
  let expanded = false
  let collapseTimer = null
  const collapseDelay = 850
  const btnFocus = document.getElementById('btnFocus')
  const focusMore = document.getElementById('focusMore')

  function applyTodos(data) {
    if (!data) return
    state = data
    if (!focusTouched && typeof data.focus === 'boolean') focusMode = data.focus
    if (!focusMode) expanded = false
    state.focus = focusMode
    render()
  }

  window.api.onTodos(applyTodos)
  window.api.listTodos().then(applyTodos)
  window.api.getSettings().then(settings => {
    if (!focusTouched && settings && typeof settings.postitFocus === 'boolean') {
      focusMode = settings.postitFocus
      if (!focusMode) expanded = false
      render()
    }
  }).catch(() => {})
  setInterval(render, 1000)

  btnFocus.addEventListener('click', () => {
    focusTouched = true
    focusMode = !focusMode
    state.focus = focusMode
    if (!focusMode) {
      expanded = false
      clearTimeout(collapseTimer)
    }
    render()
    Promise.resolve(window.api.setSettings({ postitFocus: focusMode })).catch(() => {})
  })
  focusMore.addEventListener('click', () => setExpanded(true))
  document.getElementById('btnOpen').addEventListener('click', () => window.api.openDashboard())
  document.getElementById('btnQuit').addEventListener('click', () => window.api.quitApp())
  document.getElementById('levelCharacter').addEventListener('click', () => window.api.openDashboard())

  // ---- 그립 드래그로 위젯 이동 (메인 프로세스가 커서 추적) ----
  let dragging = false
  document.getElementById('grip').addEventListener('mousedown', e => {
    e.preventDefault()
    dragging = true
    window.api.dragStart()
  })
  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; window.api.dragEnd() }
  })
  document.addEventListener('mouseleave', () => {
    if (dragging) { dragging = false; window.api.dragEnd() }
  })

  function stageOf(t, now) {
    if (t.done || !t.dueAt) return ''
    const r = t.dueAt - now
    if (r <= 0) return 'stage-boom'
    if (r <= 3 * 60000) return 'stage-panic'
    if (r <= 10 * 60000) return 'stage-critical'
    if (r <= 30 * 60000) return 'stage-burning'
    return ''
  }

  // 남은 시간에 따른 서랍식 노출 단계
  function peekOf(t, now) {
    if (t.done) return ''
    if (!t.dueAt) return 'peek-far' // 종일 일정은 끄트머리만
    const r = t.dueAt - now
    if (r <= 30 * 60000) return ''            // 30분 이내: 완전히 나옴
    if (r <= 60 * 60000) return 'peek-near'   // 1시간 이내
    if (r <= 180 * 60000) return 'peek-mid'   // 3시간 이내
    return 'peek-far'                          // 그 이상: 끄트머리만
  }

  function fmtTime(ms) {
    const d = new Date(ms)
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0')
  }

  function fmtRemain(t, now) {
    if (!t.dueAt) return ''
    const r = t.dueAt - now
    if (r <= 0) {
      const over = Math.floor(-r / 60000)
      return over < 1 ? '지금!' : `${over}분 지남`
    }
    const min = Math.floor(r / 60000)
    if (min >= 60) return `${Math.floor(min/60)}시간 ${min%60}분 남음`
    if (min >= 1) return `${min}분 남음`
    return `${Math.floor(r/1000)}초!`
  }

  // 매초 DOM을 갈아엎으면 호버/슬라이드 전환이 끊기므로, 요소는 유지하고 상태만 갱신
  let lastOrder = ''

  function makePostit(t) {
    const div = document.createElement('div')
    div.dataset.id = t.id
    div.innerHTML = `
      <svg class="bomb ic" aria-hidden="true"><use href="#i-bomb"/></svg>
      <svg class="boom-icon ic" aria-hidden="true"><use href="#i-burst"/></svg>
      <div class="p-time">
        <span class="p-clock"><svg class="ic p-clock-icon" aria-hidden="true"><use href="#i-clock"/></svg><span class="p-clock-label"></span></span>
        <span class="p-remain"></span>
      </div>
      <div class="p-title"></div>
      <div class="fuse-bar">
        <div class="fuse-fill"></div>
        <span class="fuse-spark"></span>
      </div>
      <div class="p-actions">
        <button class="b-done" data-act="done"><svg class="ic" aria-hidden="true"><use href="#i-check"/></svg>완료 +10P</button>
        <button data-act="postpone">+10분</button>
        <button data-act="nextday">다음 평일</button>
        <button class="b-delete" data-act="delete">삭제</button>
      </div>`
    div.querySelector('[data-act=done]').addEventListener('click', () => window.api.toggleTodo(t.id))
    div.querySelector('[data-act=postpone]').addEventListener('click', () => window.api.postponeTodo(t.id, 10))
    div.querySelector('[data-act=nextday]').addEventListener('click', () => window.api.postponeTodoToNextWeekday(t.id))
    div.querySelector('[data-act=delete]').addEventListener('click', () => window.api.deleteTodo(t.id))
    return div
  }

  function updatePostit(el, t, now, hero) {
    const peek = hero ? '' : peekOf(t, now)
    const cls = `postit interactive c-${t.color} ${stageOf(t, now)} ${peek} ${hero ? 'focus-hero' : ''}`.trim()
    if (el.className !== cls) el.className = cls
    el.querySelector('.p-clock-icon').style.display = t.dueAt ? '' : 'none'
    el.querySelector('.p-clock-label').textContent = t.dueAt ? fmtTime(t.dueAt) : '종일'
    el.querySelector('.p-remain').textContent = fmtRemain(t, now)
    el.querySelector('.p-title').textContent = t.title
    // 도화선: 폭탄이 달리는 마지막 30분을 잔여 비율로 표시
    const fusePct = t.dueAt ? Math.max(0, Math.min(100, (t.dueAt - now) / (30 * 60000) * 100)) : 0
    el.querySelector('.fuse-fill').style.width = fusePct + '%'
    el.querySelector('.fuse-spark').style.left = fusePct + '%'
  }

  function render() {
    const now = Date.now()
    if (state.profile) {
      document.getElementById('ptLabel').textContent = state.profile.total.toLocaleString()
      updateLevelCharacter(state.profile.level)
    }
    const bodyCls = (isMini ? 'mini ' : '') + 'theme-' + (state.theme || 'classic') + ' side-' + (state.side || 'right')
    if (document.body.className !== bodyCls) document.body.className = bodyCls
    const stack = document.getElementById('stack')
    const visible = state.todos.filter(t => !t.done)
    if (isMini) document.querySelector('.topbar').style.display = visible.length ? 'flex' : 'none'
    document.getElementById('emptyHint').style.display = isMini || visible.length ? 'none' : 'block'
    btnFocus.classList.toggle('is-on', focusMode)
    btnFocus.setAttribute('aria-pressed', focusMode ? 'true' : 'false')

    const collapsed = focusMode && !expanded
    const rendered = collapsed ? visible.slice(0, 1) : visible
    const hiddenCount = collapsed ? Math.max(0, visible.length - 1) : 0
    focusMore.textContent = `+${hiddenCount}건 대기`
    focusMore.style.display = hiddenCount ? 'block' : 'none'

    const modeKey = focusMode ? (expanded ? 'focus-expanded' : 'focus-collapsed') : 'normal'
    const order = modeKey + ':' + rendered.map(t => t.id).join(',')
    if (order !== lastOrder) {
      // 목록 구성이 바뀐 경우에만 재배치 (기존 요소는 재사용)
      const byId = {}
      for (const el of stack.children) {
        if (el.dataset.id) byId[el.dataset.id] = el
      }
      stack.textContent = ''
      for (const t of rendered) stack.appendChild(byId[t.id] || makePostit(t))
      stack.appendChild(focusMore)
      lastOrder = order
    }
    for (const el of stack.children) {
      if (!el.dataset.id) continue
      const t = rendered.find(x => x.id === el.dataset.id)
      if (t) updatePostit(el, t, now, collapsed && t === rendered[0])
    }
  }

  function setExpanded(next) {
    next = !!next && focusMode
    if (expanded === next) return
    expanded = next
    render()
  }

  function noteCursorActivity(onInteractive) {
    if (!focusMode) return
    clearTimeout(collapseTimer)
    if (onInteractive) {
      setExpanded(true)
      return
    }
    if (expanded) collapseTimer = setTimeout(() => setExpanded(false), collapseDelay)
  }

  function updateLevelCharacter(level) {
    const btn = document.getElementById('levelCharacter')
    if (!level) { btn.style.display = 'none'; return }
    const img = document.getElementById('levelCharacterImg')
    btn.style.display = ''
    btn.title = `Lv.${level.n} ${level.title}`
    if (level.stage !== currentLevelStage) {
      currentLevelStage = level.stage || ''
      btn.classList.remove('fallback-mode')
      if (currentLevelStage) img.src = `assets/level/${currentLevelStage}.png`
      else btn.classList.add('fallback-mode')
    }
  }

  document.getElementById('levelCharacterImg').addEventListener('error', () => {
    document.getElementById('levelCharacter').classList.add('fallback-mode')
  })

  // 마우스 통과 제어: 포스트잇/버튼 위에서만 클릭 활성화
  let through = true
  document.addEventListener('mousemove', e => {
    if (dragging) return // 드래그 중에는 클릭 통과 전환 금지
    const onInteractive = !!e.target.closest('.interactive')
    noteCursorActivity(onInteractive)
    if (onInteractive && through) { through = false; window.api.setMouseThrough(false) }
    else if (!onInteractive && !through) { through = true; window.api.setMouseThrough(true) }
  })
  document.addEventListener('mouseleave', () => {
    noteCursorActivity(false)
    if (!through) { through = true; window.api.setMouseThrough(true) }
  })
  if (typeof window.api.onPostitCursor === 'function') {
    window.api.onPostitCursor(cursor => noteCursorActivity(!!cursor.interactive))
  }
</script>
</body>
</html>
