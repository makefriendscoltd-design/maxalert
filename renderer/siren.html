<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    animation: flash 0.5s infinite;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }
  @keyframes flash {
    0%, 42% { background: #8f0000; }
    43%, 49% { background: #2a0000; }
    50%, 92% { background: #001456; }
    93%, 100% { background: #000428; }
  }
  /* 비네트 */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
  }
  .panel {
    text-align: center; color: #fff; max-width: 900px; padding: 40px;
    position: relative; z-index: 2;
  }
  .code {
    font-size: 58px; font-weight: 900; letter-spacing: 12px;
    animation: pulse 0.5s infinite;
    text-shadow: 0 0 40px rgba(255,255,255,0.35);
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; } }

  .glass {
    margin: 34px auto 0;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 22px;
    padding: 34px 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .task { font-size: 40px; font-weight: 800; word-break: keep-all; line-height: 1.3; }
  .countdown {
    font-size: 56px; font-weight: 900; margin-top: 14px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .countdown.overdue { color: #ffd93d; animation: blink 0.5s infinite; }
  @keyframes blink { 50% { opacity: 0.45; } }
  .sub { font-size: 15px; opacity: 0.75; margin-top: 6px; }

  .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 34px; }
  button {
    border: none; border-radius: 999px; cursor: pointer;
    font-size: 19px; font-weight: 800; padding: 16px 30px;
    font-family: inherit;
    transition: transform 0.1s, filter 0.1s;
  }
  button:hover { transform: scale(1.05); filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
  .btn-done {
    background: linear-gradient(135deg, #10b981, #059669);
    color: #fff; font-size: 23px; padding: 20px 46px;
    box-shadow: 0 8px 30px rgba(16,185,129,0.45);
  }
  .btn-snooze {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
  }
  .btn-nextday {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255,255,255,0.42);
    color: #fff;
  }
  .hint { margin-top: 30px; font-size: 14px; opacity: 0.7; letter-spacing: 0.3px; }

  /* ===== 병아리 경찰관 ===== */
  #chickWrap {
    position: fixed; bottom: -2vh; left: 50%; z-index: 1;
    pointer-events: none;
    transform: translateX(-50%) translateX(-75vw);
    filter: drop-shadow(0 12px 28px rgba(0,0,0,0.6));
    display: none;
  }
  #chickCanvas { height: 62vh; display: block; }
  #stageCharacter {
    height: 52vh; display: block; object-fit: contain;
    animation: stageBob 0.62s ease-in-out infinite alternate;
  }
  @keyframes stageBob {
    from { transform: translateY(0); }
    to { transform: translateY(-1.7vh); }
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="code">🚨 CODE BLUE 🚨</div>
    <div class="glass">
      <div class="task" id="task">일정</div>
      <div class="countdown" id="countdown">--:--</div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="actions">
      <button class="btn-done" id="btnDone">✅ 완료 +20⚡</button>
      <button class="btn-snooze" data-min="5">5분 미루기</button>
      <button class="btn-snooze" data-min="15">15분 미루기</button>
      <button class="btn-snooze" data-min="60">1시간 미루기</button>
      <button class="btn-nextday" id="btnNextday">다음 평일</button>
    </div>
    <div class="hint">완료 또는 미루기를 선택할 때까지 사이렌은 꺼지지 않습니다 · 미루기 -3⚡</div>
  </div>

  <div id="chickWrap">
    <canvas id="chickCanvas"></canvas>
    <video id="chickVideo" src="assets/chick.mp4" muted playsinline preload="auto" style="display:none"></video>
    <video id="chickMarch" src="assets/chick_march.mp4" muted playsinline loop preload="auto" style="display:none"></video>
  </div>

<script src="api-tauri.js"></script>
<script>
  const params = new URLSearchParams(location.search)
  const withSound = params.get('sound') === '1'
  const volume = Math.min(1, Math.max(0, parseFloat(params.get('volume') || '0.5')))
  const stage = params.get('stage') || ''

  let todo = null

  window.api.onSirenTodo(t => {
    todo = t
    document.getElementById('task').textContent = t.title
    updateCountdown()
  })

  setInterval(updateCountdown, 250)
  function updateCountdown() {
    if (!todo || !todo.dueAt) return
    const el = document.getElementById('countdown')
    const sub = document.getElementById('sub')
    const r = todo.dueAt - Date.now()
    if (r > 0) {
      const m = Math.floor(r / 60000), s = Math.floor((r % 60000) / 1000)
      el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
      el.classList.remove('overdue')
      sub.textContent = '일정 시작까지 남은 시간'
    } else {
      const over = Math.floor(-r / 60000)
      el.textContent = over < 1 ? 'NOW' : `+${over}분`
      el.classList.add('overdue')
      sub.textContent = '💥 이미 시작 시간이 지났습니다!'
    }
  }

  document.getElementById('btnDone').addEventListener('click', () => {
    if (todo) window.api.toggleTodo(todo.id)
  })
  document.querySelectorAll('.btn-snooze').forEach(b => {
    b.addEventListener('click', () => {
      if (todo) window.api.postponeTodo(todo.id, parseInt(b.dataset.min, 10))
    })
  })
  document.getElementById('btnNextday').addEventListener('click', () => {
    if (todo) window.api.postponeTodoToNextWeekday(todo.id)
  })

  // ---- 병아리 경찰관 (그린스크린 실시간 크로마키 + 순찰 루프) ----
  // 등장(왼쪽→가운데, 걸어와서 노려봄) → 노려보기 유지 → 옆모습 행진으로 오른쪽 퇴장 → 반복
  // 성능: 468×624 고정 해상도로 처리하고, 새 비디오 프레임이 올 때만 크로마키 연산 (정지 중 CPU 0)
  ;(function () {
    const isPrimary = params.get('sound') === '1'
    const wrap = document.getElementById('chickWrap')
    if (!isPrimary) { wrap.remove(); return } // 병아리는 주 모니터에서만 (보조 모니터 부하 절감)

    const useVideoPipeline = !stage || stage === 'chick' || stage === 'chick2'
    const sleep = ms => new Promise(r => setTimeout(r, ms))
    const OFF_L = 'translateX(-50%) translateX(-75vw)'
    const CENTER = 'translateX(-50%)'
    const OFF_R = 'translateX(-50%) translateX(75vw)'
    const GLARE_HOLD_MS = 2400
    const EXIT_MS = 2800

    function startStageImage() {
      const img = document.createElement('img')
      img.id = 'stageCharacter'
      img.alt = ''
      let stopped = false

      img.addEventListener('error', () => {
        stopped = true
        img.remove()
        wrap.style.display = 'none'
        wrap.style.transition = 'none'
        wrap.style.transform = OFF_L
        startVideoPipeline()
      }, { once: true })

      img.addEventListener('load', () => {
        wrap.appendChild(img)
        wrap.style.display = 'block'
        cycle()
      }, { once: true })

      async function cycle() {
        while (!stopped) {
          wrap.style.transition = 'none'
          wrap.style.transform = OFF_L
          await sleep(30)
          wrap.style.transition = 'transform 3s cubic-bezier(0.3, 0, 0.4, 1)'
          wrap.style.transform = CENTER
          await sleep(3000 + GLARE_HOLD_MS)
          wrap.style.transition = `transform ${EXIT_MS}ms linear`
          wrap.style.transform = OFF_R
          await sleep(EXIT_MS + 150)
        }
      }

      img.src = `assets/level/${stage}.png`
    }

    if (!useVideoPipeline) { startStageImage(); return }
    startVideoPipeline()

    function startVideoPipeline() {
    const videoIn = document.getElementById('chickVideo')   // 정면 등장 + 노려봄
    const videoMarch = document.getElementById('chickMarch') // 옆모습 제자리 행진
    const canvas = document.getElementById('chickCanvas')
    const kx = canvas.getContext('2d', { willReadFrequently: true })

    const PROC_W = 468, PROC_H = 624 // 3:4 — 표시 크기 기준 충분한 해상도
    canvas.width = PROC_W
    canvas.height = PROC_H

    let active = null
    let pumpId = 0
    let marchOk = true
    let stopped = false

    videoIn.addEventListener('error', () => { wrap.style.display = 'none'; stopped = true })
    videoMarch.addEventListener('error', () => { marchOk = false })
    videoIn.load()
    videoMarch.load() // 전환 시 버퍼링 없도록 미리 로드

    function processFrame() {
      if (!active || active.readyState < 2) return
      kx.drawImage(active, 0, 0, PROC_W, PROC_H)
      const frame = kx.getImageData(0, 0, PROC_W, PROC_H)
      const d = frame.data
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i + 1], b = d[i + 2]
        // 초록 지배 픽셀 → 투명 (어두운 비네트 그린까지 커버)
        if (g > 55 && g > r * 1.2 && g > b * 1.2) {
          d[i + 3] = 0
        } else if (g > 45 && g > r * 1.05 && g > b * 1.05) {
          // 경계 픽셀은 반투명 + 초록 번짐 제거
          d[i + 3] = Math.min(d[i + 3], 110)
          d[i + 1] = Math.max(r, b)
        } else if (g > r && g > b) {
          d[i + 1] = Math.max(r, b)
        }
      }
      kx.putImageData(frame, 0, 0)
    }

    // 새 비디오 프레임이 도착할 때만 처리 (requestVideoFrameCallback)
    function setActive(v) {
      active = v
      const id = ++pumpId
      const step = () => {
        if (stopped || id !== pumpId) return
        processFrame()
        schedule()
      }
      const schedule = () => {
        if (stopped || id !== pumpId) return
        if (v.requestVideoFrameCallback) v.requestVideoFrameCallback(step)
        else requestAnimationFrame(step)
      }
      processFrame()
      schedule()
    }

    const onceEnded = v => new Promise(r => v.addEventListener('ended', r, { once: true }))

    async function cycle() {
      while (!stopped) {
        // 1) 등장: 왼쪽 화면 밖 → 가운데
        wrap.style.transition = 'none'
        wrap.style.transform = OFF_L
        setActive(videoIn)
        videoIn.currentTime = 0
        videoIn.play().catch(() => {})
        await sleep(30) // transform 초기화 반영
        wrap.style.transition = 'transform 3s cubic-bezier(0.3, 0, 0.4, 1)'
        wrap.style.transform = CENTER
        await onceEnded(videoIn)

        // 2) 마지막 프레임(노려보는 표정)으로 잠시 대치 — 프레임이 멈추므로 연산도 멈춤
        await sleep(GLARE_HOLD_MS)

        // 3) 퇴장: 행진 영상 없으면 계속 노려보기만
        if (!marchOk) return
        setActive(videoMarch)
        videoMarch.currentTime = 0
        videoMarch.play().catch(() => {})
        wrap.style.transition = `transform ${EXIT_MS}ms linear`
        wrap.style.transform = OFF_R
        await sleep(EXIT_MS + 150)
        videoMarch.pause()
      }
    }

    videoIn.addEventListener('loadedmetadata', () => {
      wrap.style.display = 'block'
      cycle()
    })
    }
  })()

  // ---- 코드블루 사이렌 사운드 (Web Audio 합성) ----
  if (withSound) {
    const ctx = new AudioContext()
    const master = ctx.createGain()
    master.gain.value = volume * 0.6
    master.connect(ctx.destination)

    // 1) 빠른 두 톤 교차 (긴박한 경보)
    const osc = ctx.createOscillator()
    osc.type = 'triangle'
    osc.frequency.value = 780
    const oscGain = ctx.createGain()
    oscGain.gain.value = 0.7
    osc.connect(oscGain)
    oscGain.connect(master)
    osc.start()
    let hi = true
    setInterval(() => {
      hi = !hi
      osc.frequency.setValueAtTime(hi ? 780 : 520, ctx.currentTime)
    }, 260)

    // 2) 상승 "웁-웁" 스윕 사이렌
    const whoop = ctx.createOscillator()
    whoop.type = 'sawtooth'
    const whoopGain = ctx.createGain()
    whoopGain.gain.value = 0.16
    whoop.connect(whoopGain)
    whoopGain.connect(master)
    whoop.start()
    setInterval(() => {
      const t = ctx.currentTime
      whoop.frequency.setValueAtTime(380, t)
      whoop.frequency.exponentialRampToValueAtTime(950, t + 0.55)
    }, 650)

    // 3) 코드블루 "삐-삐-삐-삐" 비프
    const beep = ctx.createOscillator()
    beep.type = 'sine'
    beep.frequency.value = 1400
    const beepGain = ctx.createGain()
    beepGain.gain.value = 0
    beep.connect(beepGain)
    beepGain.connect(master)
    beep.start()
    setInterval(() => {
      const t = ctx.currentTime
      for (let i = 0; i < 4; i++) {
        beepGain.gain.setValueAtTime(0.5, t + i * 0.17)
        beepGain.gain.setValueAtTime(0, t + i * 0.17 + 0.09)
      }
    }, 1300)
  }
</script>
</body>
</html>
