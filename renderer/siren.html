<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    animation: flash 0.5s infinite;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }
  body.audio-failed { animation-duration: 0.35s; }
  .ic {
    width: 1em; height: 1em; display: inline-block; flex: 0 0 auto;
    vertical-align: -0.14em; color: inherit;
  }
  @keyframes flash {
    0%, 42% { background: #8f0000; }
    43%, 49% { background: #2a0000; }
    50%, 92% { background: #001456; }
    93%, 100% { background: #000428; }
  }
  /* 비네트 */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
  }
  .panel {
    text-align: center; color: #fff; max-width: 900px; padding: 40px;
    position: relative; z-index: 2;
  }
  .hazard-bar {
    width: min(620px, 78vw); height: 8px; margin: 0 auto;
    border-radius: 4px;
    background: repeating-linear-gradient(45deg, #c22a12 0 14px, #8f1d0c 14px 28px);
    box-shadow: 0 0 14px rgba(194,42,18,0.42);
  }
  .code {
    font-size: 58px; font-weight: 900; letter-spacing: 12px;
    margin: 18px 0;
    animation: pulse 0.5s infinite;
    text-shadow: 0 0 40px rgba(255,255,255,0.35);
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; } }

  .glass {
    margin: 34px auto 0;
    background: linear-gradient(170deg, rgba(30,34,46,0.90), rgba(20,23,32,0.90));
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(140,160,255,0.22);
    border-radius: 18px;
    padding: 34px 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .task {
    font-size: 40px; font-weight: 800; line-height: 1.3;
    word-break: keep-all; overflow-wrap: anywhere;
  }
  .countdown {
    font-size: 56px; font-weight: 900; margin-top: 14px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .countdown.overdue { color: #ffd93d; animation: blink 0.5s infinite; }
  @keyframes blink { 50% { opacity: 0.45; } }
  .sub { font-size: 15px; opacity: 0.75; margin-top: 6px; }

  .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 34px; }
  button {
    border: 1px solid rgba(140,160,255,0.22); border-radius: 10px; cursor: pointer;
    font-size: 19px; font-weight: 800; padding: 16px 30px;
    font-family: inherit;
    transition: transform 0.1s, filter 0.1s;
  }
  button:hover { transform: scale(1.05); filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
  .btn-done {
    background: linear-gradient(135deg, #10b981, #059669);
    border-color: rgba(110,231,183,0.42);
    color: #fff; font-size: 23px; padding: 20px 46px;
    box-shadow: 0 8px 30px rgba(16,185,129,0.45);
  }
  .btn-done .ic { width: 21px; height: 21px; margin-right: 7px; }
  .btn-snooze {
    background: rgba(16,19,28,0.78);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border-color: rgba(140,160,255,0.30);
    color: #fff;
  }
  .hint { margin-top: 30px; font-size: 14px; opacity: 0.7; letter-spacing: 0.3px; }

  .audio-failed-banner {
    display: none; position: fixed; z-index: 5; top: 0; left: 50%;
    transform: translateX(-50%);
    width: min(680px, calc(100% - 32px));
    padding: 18px 22px;
    color: #fee2e2; text-align: center; font-size: 15px; font-weight: 900;
    background: rgba(120,20,20,0.5);
    border: 1px solid #ef4444;
    box-shadow: 0 0 16px rgba(239,68,68,0.45);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    animation: audio-warning 0.7s infinite;
  }
  .audio-failed-banner::before,
  .audio-failed-banner::after {
    content: ''; position: absolute; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(45deg, #c22a12 0 14px, #8f1d0c 14px 28px);
  }
  .audio-failed-banner::before { top: 0; }
  .audio-failed-banner::after { bottom: 0; }
  body.audio-failed .audio-failed-banner { display: block; }
  @keyframes audio-warning {
    0%, 100% { filter: brightness(0.78); }
    50% { filter: brightness(1.3); }
  }

  /* ===== 병아리 경찰관 ===== */
  #chickWrap {
    position: fixed; bottom: -2vh; left: 50%; z-index: 1;
    pointer-events: none;
    transform: translateX(-50%) translateX(-75vw);
    filter: drop-shadow(0 12px 28px rgba(0,0,0,0.6));
    display: none;
  }
  #chickWrap video { height: 62vh; display: block; }
</style>
</head>
<body>
  <svg style="display:none" aria-hidden="true" focusable="false">
    <symbol id="i-bolt" viewBox="0 0 24 24"><path fill="currentColor" d="M13.2 2 4.8 13.2h6.1L9.8 22l9.4-12.3h-6.1z"/></symbol>
    <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M5 4 2.8 6.2M19 4l2.2 2.2"/></symbol>

    <symbol id="i-bomb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10.5" cy="14" r="7" fill="currentColor" stroke="none"/><path d="m15 8.5 2-2 2 1.5 1-2"/><circle cx="21" cy="4" r="1.3" fill="currentColor" stroke="none"/></symbol>
    <symbol id="i-burst" viewBox="0 0 24 24"><path fill="currentColor" d="m12 2 2.3 5.2 5.4-2.9-2.9 5.4L22 12l-5.2 2.3 2.9 5.4-5.4-2.9L12 22l-2.3-5.2-5.4 2.9 2.9-5.4L2 12l5.2-2.3-2.9-5.4 5.4 2.9z"/></symbol>
    <symbol id="i-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4h8v4c0 4-1.8 6-4 6s-4-2-4-6V4Zm0 2H4v2c0 2.2 1.5 4 4 4m8-6h4v2c0 2.2-1.5 4-4 4m-4 2v4m-4 2h8"/></symbol>
    <symbol id="i-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3M4.9 4.9 7 7m10 10 2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"/></symbol>
    <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10 13.8 4-3.6M8.5 16.5l-1 1a4 4 0 0 1-5.7-5.7l3-3a4 4 0 0 1 5.7 0M15.5 7.5l1-1a4 4 0 0 1 5.7 5.7l-3 3a4 4 0 0 1-5.7 0"/></symbol>
    <symbol id="i-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.4 2.5 3.6 5.5 3.6 9S14.4 18.5 12 21c-2.4-2.5-3.6-5.5-3.6-9S9.6 5.5 12 3Z"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 6 12 12M18 6 6 18"/></symbol>
  </svg>
  <div class="audio-failed-banner" role="alert">소리 재생 실패 — 화면 알림 모드</div>
  <div class="panel">
    <div class="hazard-bar"></div>
    <div class="code">CODE BLUE</div>
    <div class="hazard-bar"></div>
    <div class="glass">
      <div class="task" id="task">일정</div>
      <div class="countdown" id="countdown">--:--</div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="actions">
      <button class="btn-done" id="btnDone"><svg class="ic" aria-hidden="true"><use href="#i-check"/></svg>완료 +20P</button>
      <button class="btn-snooze" data-min="5">5분 미루기</button>
      <button class="btn-snooze" data-min="15">15분 미루기</button>
      <button class="btn-snooze" data-min="60">1시간 미루기</button>
      <button class="btn-snooze btn-nextday" id="btnNextday">다음 평일</button>
    </div>
    <div class="hint">완료 또는 미루기를 선택할 때까지 사이렌은 꺼지지 않습니다 · 미루기 -3P</div>
  </div>

  <div id="chickWrap">
    <video id="chickVideo" src="assets/chick.webm" muted playsinline preload="auto"></video>
    <video id="chickMarch" src="assets/chick_march.webm" muted playsinline loop preload="auto" style="display:none"></video>
  </div>

<script src="api-tauri.js"></script>

<script>
  const params = new URLSearchParams(location.search)
  const withSound = params.get('sound') === '1'
  const volume = Math.min(1, Math.max(0, parseFloat(params.get('volume') || '0.5')))

  let todo = null

  window.api.onSirenTodo(t => {
    todo = t
    document.getElementById('task').textContent = t.title
    updateCountdown()
  })

  setInterval(updateCountdown, 250)
  function updateCountdown() {
    if (!todo || !todo.dueAt) return
    const el = document.getElementById('countdown')
    const sub = document.getElementById('sub')
    const r = todo.dueAt - Date.now()
    if (r > 0) {
      const m = Math.floor(r / 60000), s = Math.floor((r % 60000) / 1000)
      el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
      el.classList.remove('overdue')
      sub.textContent = '일정 시작까지 남은 시간'
    } else {
      const over = Math.floor(-r / 60000)
      el.textContent = over < 1 ? 'NOW' : `+${over}분`
      el.classList.add('overdue')
      sub.textContent = '이미 시작 시간이 지났습니다!'
    }
  }

  document.getElementById('btnDone').addEventListener('click', () => {
    if (todo) window.api.toggleTodo(todo.id)
  })
  document.querySelectorAll('.btn-snooze').forEach(b => {
    b.addEventListener('click', () => {
      if (b.id === 'btnNextday') { if (todo) window.api.postponeTodoToNextWeekday(todo.id); return }
      if (todo) window.api.postponeTodo(todo.id, parseInt(b.dataset.min, 10))
    })
  })

  // ---- 병아리 경찰관 (투명 WebM 재생 + 순찰 루프) ----
  // 등장(왼쪽→가운데, 걸어와서 노려봄) → 노려보기 유지 → 옆모습 행진으로 오른쪽 퇴장 → 반복
  // 알파 채널이 영상에 미리 구워져 있어(VP9+alpha) 실시간 크로마키 연산 없음
  // → CPU 부하 최소, 모든 모니터에서 부드럽게 재생
  ;(function () {
    const wrap = document.getElementById('chickWrap')
    const videoIn = document.getElementById('chickVideo')   // 정면 등장 + 노려봄
    const videoMarch = document.getElementById('chickMarch') // 옆모습 제자리 행진

    // WKWebView(맥 Tauri)는 VP9 알파를 렌더링하지 못해 배경째 재생됨
    // → WebKit에서만 HEVC-with-alpha(hvc1 .mov)로 교체. Chromium(윈도우 Electron)은 UA에 Chrome 포함 → webm 유지
    const needsHevcAlpha = /AppleWebKit/i.test(navigator.userAgent) && !/Chrom(e|ium)/i.test(navigator.userAgent)
    if (needsHevcAlpha) {
      videoIn.src = 'assets/chick_hevc.mov'
      videoMarch.src = 'assets/chick_march_hevc.mov'
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms))
    const OFF_L = 'translateX(-50%) translateX(-75vw)'
    const CENTER = 'translateX(-50%)'
    const OFF_R = 'translateX(-50%) translateX(75vw)'
    const GLARE_HOLD_MS = 2400
    const EXIT_MS = 2800

    let marchOk = true
    let stopped = false

    videoIn.addEventListener('error', () => { wrap.style.display = 'none'; stopped = true })
    videoMarch.addEventListener('error', () => { marchOk = false })
    videoIn.load()
    videoMarch.load() // 전환 시 버퍼링 없도록 미리 로드

    function show(v, other) {
      other.style.display = 'none'
      v.style.display = 'block'
    }

    const onceEnded = v => new Promise(r => v.addEventListener('ended', r, { once: true }))

    async function cycle() {
      while (!stopped) {
        // 1) 등장: 왼쪽 화면 밖 → 가운데
        wrap.style.transition = 'none'
        wrap.style.transform = OFF_L
        show(videoIn, videoMarch)
        videoIn.currentTime = 0
        videoIn.play().catch(() => {})
        await sleep(30) // transform 초기화 반영
        wrap.style.transition = 'transform 3s cubic-bezier(0.3, 0, 0.4, 1)'
        wrap.style.transform = CENTER
        await onceEnded(videoIn)

        // 2) 마지막 프레임(노려보는 표정)으로 잠시 대치
        await sleep(GLARE_HOLD_MS)

        // 3) 퇴장: 행진 영상 없으면 계속 노려보기만
        if (!marchOk) return
        show(videoMarch, videoIn)
        videoMarch.currentTime = 0
        videoMarch.play().catch(() => {})
        wrap.style.transition = `transform ${EXIT_MS}ms linear`
        wrap.style.transform = OFF_R
        await sleep(EXIT_MS + 150)
        videoMarch.pause()
      }
    }

    videoIn.addEventListener('loadedmetadata', () => {
      wrap.style.display = 'block'
      cycle()
    })
  })()

  // ---- 코드블루 사이렌 사운드 (Web Audio 합성) ----
  if (withSound) {
    const ctx = new AudioContext()
    const syncAudioFallback = () => {
      document.body.classList.toggle('audio-failed', ctx.state !== 'running')
    }
    ctx.addEventListener('statechange', syncAudioFallback)
    setTimeout(syncAudioFallback, 1500)

    const master = ctx.createGain()
    master.gain.value = volume * 0.6
    master.connect(ctx.destination)

    // 1) 빠른 두 톤 교차 (긴박한 경보)
    const osc = ctx.createOscillator()
    osc.type = 'triangle'
    osc.frequency.value = 780
    const oscGain = ctx.createGain()
    oscGain.gain.value = 0.7
    osc.connect(oscGain)
    oscGain.connect(master)
    osc.start()
    let hi = true
    setInterval(() => {
      hi = !hi
      osc.frequency.setValueAtTime(hi ? 780 : 520, ctx.currentTime)
    }, 260)

    // 2) 상승 "웁-웁" 스윕 사이렌
    const whoop = ctx.createOscillator()
    whoop.type = 'sawtooth'
    const whoopGain = ctx.createGain()
    whoopGain.gain.value = 0.16
    whoop.connect(whoopGain)
    whoopGain.connect(master)
    whoop.start()
    setInterval(() => {
      const t = ctx.currentTime
      whoop.frequency.setValueAtTime(380, t)
      whoop.frequency.exponentialRampToValueAtTime(950, t + 0.55)
    }, 650)

    // 3) 코드블루 "삐-삐-삐-삐" 비프
    const beep = ctx.createOscillator()
    beep.type = 'sine'
    beep.frequency.value = 1400
    const beepGain = ctx.createGain()
    beepGain.gain.value = 0
    beep.connect(beepGain)
    beepGain.connect(master)
    beep.start()
    setInterval(() => {
      const t = ctx.currentTime
      for (let i = 0; i < 4; i++) {
        beepGain.gain.setValueAtTime(0.5, t + i * 0.17)
        beepGain.gain.setValueAtTime(0, t + i * 0.17 + 0.09)
      }
    }, 1300)
  }
</script>
</body>
</html>
